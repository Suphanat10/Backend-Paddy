version: "3.9"

services:
  backend:
    image: suphanat10/paddy-backend:latest
    container_name: backend-paddy-node
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: mysql://paddy_admin:Paddy%402025_Secure%21@db:3306/Project-01
      LINE_CHANNEL_ACCESS_TOKEN: "I5+rX5K9HAQGunE9QSIFl+OBvZMhQykJi28/3CXKwiZaSyC/UjQkshPb5VED9xgtO9BWRc23lUW4Fa/i4cAi3vAcy4usxjztpWmxIkZy6YmHeIBDLFnvpajy8t34KbMuDZ52AuC2tHWZ3HrXVEgwVwdB04t89/1O/w1cDnyilFU="
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paddy-net

  db:
    image: mysql:8.0
    container_name: backend-paddy-db
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=256M --innodb-log-file-size=64M --max-connections=150 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: Paddy@2025_Secure!
      MYSQL_DATABASE: Project-01
      MYSQL_USER: paddy_admin
      MYSQL_PASSWORD: Paddy@2025_Secure!
    ports:
      - "3306:3306"
    volumes:
      - mysql_production_data:/var/lib/mysql
    networks:
      - paddy-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pPaddy@2025_Secure!" ]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  paddy-net:
    driver: bridge

volumes:
  mysql_production_data:
